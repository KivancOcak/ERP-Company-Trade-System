      text-align: center;

    button:hover {
  background: limegreen; /* lighter green on hover */
  transform: scale(1.03);
  transition: background 0.2s ease, transform 0.2s ease;
}
    button:disabled {
      background: gray;
      cursor: not-allowed;
    }
    #menuOutput {
  transition: transform 0.4s ease, opacity 0.4s ease;
  transform-origin: center center;
}
/* Fade-out + slight 3D rotate */
.fade-out {
  opacity: 0;
  transform: perspective(600px) rotateY(15deg) scale(0.98);
}
/* Fade-in back to normal */
.fade-in {
  opacity: 1;
  transform: perspective(600px) rotateY(0deg) scale(1);
}

 
 #mapContainer {
  display: flex;
  width: 100%;
  height: calc(100vh - 100px); /* or another value so canvas is visible */
  position: relative;
  box-sizing: border-box;
}

/* Make canvas flex-grow larger so it’s wider relative to panel */
#logisticsCanvas {
  flex: 3; /* was flex:1; now 3 parts for map, 1 part for panel */
  background: #222;
  border: 1px solid lime;
}
/* Side panel: flex:1, with min/max widths to avoid overlap */
#mapPanel {
  flex: 1;
  min-width: 200px;
  max-width: 300px;
  background: #111;
  color: lime;
  padding: 10px;
  box-sizing: border-box;
  font-family: monospace;
  overflow-y: auto;
}
/* Vehicle info box: make more visible */
#vehicleInfoBox {
  position: absolute;
  background: rgba(0,0,0,0.85);

  border-radius: 5px;
  font-family: monospace;
  font-size: 0.9rem;
  pointer-events: none;
  display: none;
  z-index: 10000;
  box-shadow: 0 0 8px rgba(0,255,0,0.7);
}
/* Buttons hover inherited; ensure consistent */
#mapPanel button:hover {
  background: limegreen;
  transform: scale(1.03);
  transition: background 0.2s ease, transform 0.2s ease;
}


    #userActions, #salesActions {

      color: lime;
      border: 1px solid lime;

    function loadUsers() {
      const stored = localStorage.getItem('users');
      if (stored) {
        try { users = JSON.parse(stored); } catch(e) { users = []; }
      }
      if (!users.length) {
        users = [
          { id: 1, name: "Ali", email: "ali@example.com", phone: "05001234567", username: "ali", password: "1234", businessAcc: "BA1001", secretQuestion: "What is your favorite color?", secretAnswer: "red" },
          { id: 2, name: "Ayşe", email: "ayse@example.com", phone: "05559876543", username: "ayse", password: "5678", businessAcc: "BA1002", secretQuestion: "What is your favorite color?", secretAnswer: "blue" }
        ];
        saveUsers();
      }
    }
    function saveUsers() { localStorage.setItem('users', JSON.stringify(users)); }
    function loadCurrentUser() {
      const stored = localStorage.getItem('currentUser');
      if (stored) {
        try {
          const cu = JSON.parse(stored);
          const user = users.find(u => u.username === cu.username && u.password === cu.password);
          if (user) {
            currentUser = {...user};
            showMenu();
            welcomeEl.innerText = `🔐 Welcome back ${user.name}`;
            userActions.style.display = 'flex';
            return true;
          }
        } catch(e){}
      }
      return false;
    }

    function renderInitial(message) { output.innerText = message; }
    function renderMenu(html) { menuOutput.innerHTML = `<pre style='color:lime; white-space:pre-wrap;'>${html}</pre>`; }

    function registerFlow() {
      const name = prompt("Enter your name:"); if (!name) return renderInitial("Registration cancelled.");
      let username = prompt("Choose a username:"); if (!username) return renderInitial("Registration cancelled."); username = username.trim();
      if (users.find(u => u.username === username)) return renderInitial("Username taken. Choose another.");
      const email = prompt("Enter your email:"); if (!email) return renderInitial("Registration cancelled.");
      const phone = prompt("Enter phone number:"); if (!phone) return renderInitial("Registration cancelled.");
      const password = prompt("Choose a password:"); if (!password) return renderInitial("Registration cancelled.");
      const secretQuestion = prompt("Enter a secret question for password recovery:"); if (!secretQuestion) return renderInitial("Registration cancelled.");
      const secretAnswer = prompt("Enter the answer to your secret question:"); if (!secretAnswer) return renderInitial("Registration cancelled.");
      const nextId = users.length ? users[users.length-1].id+1 : 1;
      const businessAcc = 'BA'+(1000+nextId);
      users.push({ id: nextId, name, email, phone, username, password, businessAcc, secretQuestion, secretAnswer });
      saveUsers();
      renderInitial(`✅ Registration successful. Your business account: ${businessAcc}. You can now login, ${name}.`);
    }

    function loginFlow() {
      const choice = prompt("Login or Forgot Password? Enter '1' for Login, '2' for Forgot Password:");
      if (choice==='2') { forgotFlow(); return; }
      if (choice!=='1') return renderInitial("Invalid choice.");
      let username = prompt("Enter username:"); if (!username) return renderInitial("Login cancelled."); username=username.trim();
      let password = prompt("Enter password:"); if (!password) return renderInitial("Login cancelled.");
      const user = users.find(u=>u.username===username&&u.password===password);
      if (user) {
        currentUser={...user}; localStorage.setItem('currentUser', JSON.stringify({username:user.username,password:user.password}));
        showMenu(); welcomeEl.innerText=`🔐 Welcome ${user.name}`; userActions.style.display='flex'; renderMenu("Choose an action.");
      } else renderInitial("❌ Invalid credentials. Try again.");
    }
    function forgotFlow() {
      let username = prompt("Enter your username for password recovery:"); if (!username) return renderInitial("Cancelled."); username=username.trim();
      const user = users.find(u=>u.username===username);
      if (!user) return renderInitial("User not found.");
      const answer = prompt(user.secretQuestion); if (answer===null) return renderInitial("Cancelled.");
      if (answer===user.secretAnswer) renderInitial(`🔑 Your password is: ${user.password}`);
      else renderInitial("❌ Incorrect answer to secret question.");
    }
    function exitFlow() { renderInitial("Exiting... Close the tab."); setTimeout(()=>window.close(),500); }
    function showMenu() { initialScreen.style.display='none'; menuDiv.style.display='block'; output.innerText=''; salesActions.style.display='none'; activityInput.value = ''; }
    function logout() { currentUser=null; localStorage.removeItem('currentUser'); menuDiv.style.display='none'; initialScreen.style.display='block'; renderInitial("Logged out. Choose Register, Login, Forgot Password, or Exit."); }

    function showMyInfo() { if(!currentUser) return; const u=currentUser; renderMenu(`👤 Your Info:\nID: ${u.id}\nName: ${u.name}\nEmail: ${u.email}\nPhone: ${u.phone}\nUsername: ${u.username}\nPassword: ${u.password}\nBusinessAcc: ${u.businessAcc}`); }
    function updateMyInfo() {
      if(!currentUser) return;
      let u=currentUser;
      const newName=prompt("Enter new name:",u.name); if(newName)u.name=newName;
      const newEmail=prompt("Enter new email:",u.email); if(newEmail)u.email=newEmail;
      const newPhone=prompt("Enter new phone:",u.phone); if(newPhone)u.phone=newPhone;
      const newPassword=prompt("Choose a new password (leave blank to keep):"); if(newPassword)u.password=newPassword;
      const changeSQ=prompt("Change secret question? Enter 'yes' to change:");
      if(changeSQ&&changeSQ.toLowerCase()==='yes'){
        const newQ=prompt("Enter new secret question:",u.secretQuestion); if(newQ)u.secretQuestion=newQ;
        const newA=prompt("Enter answer to new secret question:",u.secretAnswer); if(newA)u.secretAnswer=newA;
      }
      const idx=users.findIndex(x=>x.username===u.username);
      if(idx>=0)users[idx]=u; saveUsers(); currentUser=u; renderMenu("✏️ Your info updated.");
    }
    function deleteMyAccount() { if(!currentUser) return; const c=prompt("Type DELETE to confirm deletion of your account:"); if(c==='DELETE'){ users=users.filter(u=>u.username!==currentUser.username); saveUsers(); localStorage.removeItem('currentUser'); currentUser=null; renderMenu("❌ Your account deleted."); setTimeout(()=>{ logout(); },1000);} else renderMenu("❌ Deletion cancelled."); }

    function loadTrades() { const stored=localStorage.getItem('trades'); try{return stored?JSON.parse(stored):[];}catch(e){return [];} }
    function saveTrades(trades){ localStorage.setItem('trades',JSON.stringify(trades)); }

    function parsePrice(input) {
      if (!input) return null;
      const cleaned = input.replace(/[^0-9.]/g, '');
      const num = parseFloat(cleaned);
      return isNaN(num) ? null : num;
    }
     function calculateKDV(price) { return price * 0.20; }
    function calculateOTV(price) {
      let rate = 0;
      if (price <= 184000) rate = 0.45;
      else if (price <= 220000) rate = 0.50;
      else if (price <= 250000) rate = 0.60;
      else if (price <= 280000) rate = 0.70;
      else rate = 0.80;
      return price * rate;
    }

    function openSales() {

    function showSpecialCodes() {
      let html = '<table><thead><tr><th>Action Code</th><th>Description</th></tr></thead><tbody>';
      for (const [code, info] of Object.entries(activityMap)) {
        html += `<tr><td>${code}</td><td class="text-left">${info.desc}</td></tr>`;
      }
      html += '</tbody></table>';
      menuOutput.innerHTML = html;
    }
    function handleActivityCode() {
      const code = activityInput.value.trim().toUpperCase();
      if (!code) return;
      activityInput.value = '';
      const info = activityMap[code];
      if (!info) {
        renderMenu("⛔ Unknown action code.");
        return;
      }
      const action = info.action;
      switch(action) {
        case 'VIEW_PRODUCTS': viewProductsSales(); break;
        case 'CREATE_ORDER': createOrderSales(); break;
        case 'UPDATE_ORDER': updateOrderSales(); break;
        case 'VIEW_PROFIT': viewProfitSales(); break;
        case 'DELETE_ORDER': deleteOrderSales(); break;
        case 'VIEW_STOCK': showInventoryTable(); break;
        case 'CUSTOMER_REQUESTS': showCustomerRequests(); break;
        case 'COMPANY_ACCOUNT': viewCompanyAccount(); break;
        case 'BUY_PURCHASE': openBuyPage(); break;  
        case 'RESET_SYSTEM': openResetPage(); break;
        case 'FIN_GRAPH': openFinancialGraphPage(); break;
        case 'LOGISTICS_MAP': openLogisticsMapPage(); break;
        default:
          renderMenu("⛔ Action not implemented.");
      }
    }

    function viewProductsSales() {
      const acc = currentUser.businessAcc;
      const trades = loadTrades().filter(t=>t.businessAcc===acc);
      if(!trades.length) {
        renderMenu("No products/orders found for your account.");
        return;
      }
      let html = '<table><thead><tr>' +
        '<th>OrderID</th><th>ProdID</th><th>Type</th><th>Qty</th><th>Price</th><th>Cost</th><th>KDV</th><th>ÖTV</th><th>CargoCost</th><th>Address</th><th>Dam?</th><th>DamQty</th><th>Status</th><th>OrderDate</th><th>ETA</th>' +
        '</tr></thead><tbody>';
      trades.forEach(t=>{
        html += '<tr>' +
          `<td>${t.orderId}</td>` +
          `<td>${t.productId}</td>` +
          `<td>${t.type}</td>` +
          `<td>${t.quantity}</td>` +
          `<td>${t.price.toFixed(2)}</td>` +
          `<td>${t.cost.toFixed(2)}</td>` +
          `<td>${t.kdv.toFixed(2)}</td>` +
          `<td>${t.otv? t.otv.toFixed(2): '0.00'}</td>` +
          `<td>${t.cargoCost? t.cargoCost.toFixed(2): '0.00'}</td>` +
          `<td class="text-left">${t.address || ''}</td>` +
          `<td>${t.isDamaged? 'Y':'N'}</td>` +
          `<td>${t.damagedQty}</td>` +
          `<td>${t.status}</td>` +
          `<td>${t.orderDate}</td>` +
          `<td>${t.etaDays}</td>` +
        '</tr>';
      });
      html += '</tbody></table>';
      menuOutput.innerHTML = html;
    }

    function exportTradesToCSV() {
  const trades = loadTrades().filter(t => t.businessAcc === currentUser.businessAcc);
  if (trades.length === 0) {
    alert("No sales to export.");
    return;
  }

  const headers = [
    'Order ID', 'Product ID', 'Qty', 'Price', 'Cost',
    'KDV', 'OTV', 'Cargo', 'Damaged Qty', 'Damaged Cost',
    'Order Date', 'Customer', 'Status'
  ];

  const csv = [
    headers.join(','),
    ...trades.map(t => [
      t.orderId, t.productId, t.quantity, t.price, t.cost,
      t.kdv, t.otv, t.cargoCost, t.damagedQty || 0,
      (t.cost * (t.damagedQty || 0)),
      t.orderDate, t.customer || '', t.status
    ].map(val => `"${val}"`).join(','))
  ].join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", `SalesReport_${new Date().toISOString().split('T')[0]}.csv`);
  link.style.display = "none";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

    function updateOrderSales() {
      const acc = currentUser.businessAcc;

      let userTrades = trades.filter(t=>t.businessAcc===acc);
      if(!userTrades.length) { renderMenu("No orders to view/update."); return; }
      let list="Orders:\n";

      const idxGlobal = trades.findIndex(t=>t.orderId===sel && t.businessAcc===acc);
      if(idxGlobal<0) { renderMenu("Order ID not found."); return; }
      let order = trades[idxGlobal];
      const newProd = prompt("Enter new Product ID (leave blank to keep):", order.productId);
      if(newProd && newProd!==order.productId) {
        if(trades.some(t=>t.businessAcc===acc && t.productId===newProd)) { renderMenu("❌ Product ID exists. Update canceled."); return; }
        order.productId=newProd; order.orderId=newProd;
      }
      const newType = prompt("Enter new Product Type (leave blank to keep):", order.type);
      if(newType) order.type=newType;
      const newQty = prompt("Enter new Quantity (leave blank to keep):", order.quantity);
      if(newQty){ const nq=parseInt(newQty,10); if(!isNaN(nq)&&nq>0) order.quantity=nq; }
      const newPriceInput = prompt("Enter new Sale Price per unit (include symbols or leave blank):", order.price);
      if(newPriceInput){ const np=parsePrice(newPriceInput); if(np!==null&&np>0) order.price=np; }
      const newCostInput = prompt("Enter new Cost per unit (include symbols or leave blank):", order.cost);
      if(newCostInput){ const nc=parsePrice(newCostInput); if(nc!==null&&nc>=0) order.cost=nc; }
      const newDistInput = prompt("Enter new delivery distance in KM (leave blank to keep):");
      if(newDistInput){ const d=parseInt(newDistInput,10); if(!isNaN(d)&&d>0) order.cargoCost = Math.ceil(d/10)*10; }
      const newAddress = prompt("Enter new delivery address (leave blank to keep):", order.address);

        else{ order.isDamaged=false; order.damagedQty=0; }

    }

    // Customer Requests & replies
    function processFulfillment(req) {
      const inv = getInventory();
      const itemIdx = inv.findIndex(it => it.name === req.requestedItem);
      if (itemIdx < 0) return false;
      const item = inv[itemIdx];
      if (item.quantity < req.requestedQty) {
        alert(`Insufficient stock for ${item.name}. Have ${item.quantity}, requested ${req.requestedQty}.`);
        return false;
      }
      item.quantity -= req.requestedQty;
      saveInventory(inv);
      const revenue = item.salePrice * req.requestedQty;

function getCustomerRequests() {
  const stored = localStorage.getItem('customerRequests');
  const ts = parseInt(localStorage.getItem('customerRequestsTimestamp') || '0', 10);
  const now = Date.now();
  if (!stored || isNaN(ts) || now - ts > 5*60*1000) {
    return generateCustomerRequests();
  }
  try {
    const arr = JSON.parse(stored);
    if (Array.isArray(arr)) return arr;
  } catch {}
  return generateCustomerRequests();
}

      const qty = parseInt(qtyStr, 10);
      if (isNaN(qty) || qty <= 0) {

      const baseCost = item.cost * qty;

        otv = calculateOTV(item.cost) * qty;
      }

      acc.balance -= total;
      saveCompanyAccount(acc);
      let inv = getInventory();

      if (existing) {
        existing.quantity += qty;

        inv.push({
          id: item.id,

          quantity: qty,
          salePrice: item.salePrice,
          cost: item.cost
        });
      }
      saveInventory(inv);
      renderMenu(`✅ Purchased ${qty} x ${item.name}. Total cost ${total.toFixed(2)} deducted. New balance: ${acc.balance.toFixed(2)}`);
    }

    initInventory();
    initCompanyAccount();
    setInterval(() => {

function openFinancialGraphPage() {
  if (!currentUser) return renderMenu("⚠️ Please login first.");
  graphOpen = true;

  // 1. Gather actual profit for current year from trades
  const trades = loadTrades().filter(t => t.businessAcc === currentUser.businessAcc);
  const profitByYear = {};
  trades.forEach(t => {
    const year = t.orderDate ? t.orderDate.split('-')[0] : null;
    if (!year) return;
    const qty = t.quantity || 0;
    const revenue = (t.price || 0) * qty;
    const costTotal = (t.cost || 0) * qty;
    const kdvTotal = (t.kdv || 0) * qty;
    const otvTotal = (t.otv || 0) * qty;
    const cargo = t.cargoCost || 0;
    const damagedCost = t.isDamaged ? ((t.cost || 0) * (t.damagedQty || 0)) : 0;
    const net = revenue - costTotal - kdvTotal - otvTotal - cargo - damagedCost;
    profitByYear[year] = (profitByYear[year] || 0) + net;
  });

  // 2. Fixed historical values for 2020–2024
  const histValues = {
    '2020': 50000,
    '2021': 45000,
    '2022': 47000,
    '2023': 49000,
    '2024': 51000
  };
  const startYear = 2020;
  const currentYear = new Date().getFullYear(); // e.g. 2025

  // 3. Build arrays: always include 2020–2024, and always include 2025 at same level as 2024 if no net
  const dataYears = [];
  const dataProfits = [];
  // 2020–2024
  for (let y = startYear; y <= startYear + 4; y++) {
    const ys = String(y);
    dataYears.push(ys);
    dataProfits.push(histValues[ys] != null ? histValues[ys] : 0);
  }
  // 2025
  const ysCurrent = String(currentYear);
  dataYears.push(ysCurrent);
  // net profit/loss in 2025
  const net2025 = profitByYear[ysCurrent] != null ? profitByYear[ysCurrent] : 0;
  // baseline = 2024 fixed
  const base2024 = histValues[String(startYear + 4)] || 0;
  // 2025 value = base2024 + net2025 (so equals 2024 if net2025=0)
  dataProfits.push(base2024 + net2025);


  // 4. Build HTML and animate in
  const html = `
    <h3>Company Financial Graph Over Years</h3>
    <canvas id="financialChart" width="600" height="400"
      style="background:#111; display:block; margin:auto; border:1px solid lime;"></canvas>
    <div style="text-align:center; margin-top:10px;">
      <button id="btnBackFromGraph">Back to Menu</button>
    </div>`;
  animateMenuOutput(html);

  setTimeout(() => {
    // Auto-scroll so graph is centered
    menuOutput.scrollIntoView({ behavior: 'smooth', block: 'center' });

    const canvas = document.getElementById('financialChart');
    if (canvas && canvas.getContext) {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const margin = 50;
      const w = canvas.width - margin * 2;
      const h = canvas.height - margin * 2;
      const n = dataYears.length; // should be 6 for 2020–2025
      const xStep = n > 1 ? w / (n - 1) : w;
      // Determine min/max among all plotted values (2020–2025)
      const validProfits = dataProfits.filter(v => v != null);
      const minP = validProfits.length > 0 ? Math.min(...validProfits, 0) : 0;
      const maxP = validProfits.length > 0 ? Math.max(...validProfits, 0) : 0;
      const totalRange = maxP - minP || 1;

      // Draw axes
      ctx.strokeStyle = 'lime';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(margin, margin);
      ctx.lineTo(margin, margin + h);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(margin, margin + h);
      ctx.lineTo(margin + w, margin + h);
      ctx.stroke();

      // Y ticks/grid
      ctx.fillStyle = 'lime';
      ctx.font = '12px monospace';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      const ticks = 5;
      for (let i = 0; i <= ticks; i++) {
        const yVal = minP + (totalRange * i / ticks);
        const yPos = margin + h - (h * i / ticks);
        ctx.fillText(yVal.toFixed(0), margin - 5, yPos);
        ctx.strokeStyle = 'rgba(0,128,0,0.3)';
        ctx.beginPath();
        ctx.moveTo(margin, yPos);
        ctx.lineTo(margin + w, yPos);
        ctx.stroke();
      }

      // X labels
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      dataYears.forEach((yr, idx) => {
        const xPos = margin + xStep * idx;
        const yPos = margin + h + 5;
        ctx.fillText(yr, xPos, yPos);
      });

      // Prepare points for all profits 2020–2025
      const points = [];
      dataYears.forEach((yr, idx) => {
        const val = dataProfits[idx];
        if (val != null) {
          const x = margin + xStep * idx;
          const y = margin + h - ((val - minP) / totalRange) * h;
          points.push({ idx, x, y, val });
        }
      });

      // Draw horizontal connectors (dashed from Y-axis to each point)
      ctx.strokeStyle = 'rgba(0,0,255,0.5)';
      ctx.setLineDash([5, 5]);
      points.forEach(pt => {
        ctx.beginPath();
        ctx.moveTo(margin, pt.y);
        ctx.lineTo(pt.x, pt.y);
        ctx.stroke();
      });
      ctx.setLineDash([]);

      // Draw smooth blue curve connecting all points including 2025
      ctx.strokeStyle = 'blue';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < points.length; i++) {
        const pt = points[i];
        if (i === 0) {
          ctx.moveTo(pt.x, pt.y);
        } else {
          const prev = points[i - 1];
          const mx = (prev.x + pt.x) / 2;
          const maxOffset = h * 0.02;
          const offset = (Math.random() * 2 - 1) * maxOffset;
          const my = ((prev.y + pt.y) / 2) + offset;
          ctx.quadraticCurveTo(mx, my, pt.x, pt.y);
        }
      }
      ctx.stroke();

      // Draw all points & labels
      ctx.fillStyle = 'blue';
      points.forEach(pt => {
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 4, 0, 2 * Math.PI);
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(pt.val.toFixed(0), pt.x, pt.y - 6);
        ctx.fillStyle = 'blue';
      });

      // Title
      ctx.fillStyle = 'white';
      ctx.font = '16px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Profit Over Years', margin + w / 2, margin - 30);
    }

    // Back button
    const btn = document.getElementById('btnBackFromGraph');
    if (btn) btn.onclick = () => {
      graphOpen = false;  // if using auto-refresh
      closeSales();
    };
  }, 450);

}

function openLogisticsMapPage() {
  if (!currentUser) return renderMenu("⚠️ Please login first.");
  console.log("openLogisticsMapPage called");

  // Build HTML: map container, canvas, panel with controls + minimap
  const html = `
    <div id="mapContainer" style="display:flex; width:100%; height:calc(100vh - 40px); position:relative;">
      <canvas id="logisticsCanvas" style="flex:3; background:#222; cursor:grab;"></canvas>
      <div id="mapPanel" style="flex:1; min-width:300px; background:#111; color:lime; padding:10px; box-sizing:border-box; font-family:monospace; overflow-y:auto;">
        <h3>Logistics Panel</h3>
        <div id="vehicleCounts">Loading...</div>
        <button id="btnAddVehicle" style="margin-top:10px; width:100%; background:#0a0; color:#fff; padding:8px; border:none; cursor:pointer;">Add Vehicle</button>
        <button id="btnExportLog" style="margin-top:10px; width:100%; background:#08f; color:#fff; padding:8px; border:none; cursor:pointer;">Export Vehicle Log</button>
        <div style="margin-top:10px;">
          <h4>Minimap</h4>
          <canvas id="miniMap" width="150" height="100" style="border:1px solid lime; display:block; margin:auto; background:#111;"></canvas>
        </div>
        <button id="btnCloseMap" style="margin-top:10px; width:100%; background:#f00; color:#fff; padding:8px; border:none; cursor:pointer;">Quit From Map</button>
      </div>
      <div id="vehicleInfoBox" style="position:absolute; display:none; background:rgba(0,0,0,0.85); color:lime; padding:10px; border:1px solid lime; border-radius:5px; font-family:monospace; font-size:0.9rem; pointer-events:none; z-index:10000; box-shadow:0 0 8px rgba(0,255,0,0.7);"></div>
    </div>
  `;
  menuOutput.innerHTML = html;
  menuOutput.classList.remove('fade-in','fade-out');

  setTimeout(() => {
    const canvas = document.getElementById('logisticsCanvas');
    const ctx = canvas.getContext('2d');
    const panel = document.getElementById('mapPanel');
    const btnAdd = document.getElementById('btnAddVehicle');
    const btnExport = document.getElementById('btnExportLog');
    const btnClose = document.getElementById('btnCloseMap');
    const vehicleCountsDiv = document.getElementById('vehicleCounts');
    const miniMapCanvas = document.getElementById('miniMap');
    const miniCtx = miniMapCanvas.getContext('2d');
    const infoBox = document.getElementById('vehicleInfoBox');
    if (!canvas || !ctx || !panel || !btnAdd || !btnExport || !btnClose || !vehicleCountsDiv || !miniMapCanvas || !infoBox) {
      console.error("Map elements not found");
      return;
    }

    // Grid settings
    const gridCols = 7;
    const gridRows = 5;
    let grid = null;

    // Zoom & pan
    let scale = 1.0, offsetX = 0, offsetY = 0;
    let isDragging = false, dragStartX = 0, dragStartY = 0;

    // Vehicle & auxiliary units
    let vehicles = [];
    let trafficUnits = [], humanUnits = [];
    const movementLog = [];
    const destinationMarkers = []; // { ix, iy, address, plate }

    // PRNG for deterministic building placement
    function pseudoRandomGenerator(seed) {
      let value = seed;
      return function() {
        value = (value * 9301 + 49297) % 233280;
        return value / 233280;
      };
    }

    // Compute grid: intersections, road colors, buildingPositions
    function computeGrid() {
      const w = canvas.width, h = canvas.height;
      const cellW = w / (gridCols - 1), cellH = h / (gridRows - 1);
      const intersections = [];
      for (let iy = 0; iy < gridRows; iy++)
        for (let ix = 0; ix < gridCols; ix++)
          intersections.push({ ix, iy, x: ix * cellW, y: iy * cellH });

      // Road colors persistence
      const rcKey = `roadColors_${currentUser.businessAcc}`;
      let saved = null;
      try { saved = JSON.parse(localStorage.getItem(rcKey) || 'null'); } catch {}
      let horiz, vert;
      if (saved && saved.horiz && saved.vert) {
        horiz = saved.horiz; vert = saved.vert;
      } else {
        horiz = []; for (let iy = 0; iy < gridRows; iy++) {
          horiz[iy] = [];
          for (let ix = 0; ix < gridCols - 1; ix++)
            horiz[iy][ix] = (Math.random() < 0.7 ? 'blue' : 'orange');
        }
        vert = []; for (let iy = 0; iy < gridRows - 1; iy++) {
          vert[iy] = [];
          for (let ix = 0; ix < gridCols; ix++)
            vert[iy][ix] = (Math.random() < 0.7 ? 'blue' : 'orange');
        }
        localStorage.setItem(rcKey, JSON.stringify({ horiz, vert }));
      }
      // Building positions persistence with types
      const bpKey = `buildingPositions_${currentUser.businessAcc}`;
      let buildingPositions = null;
      try { buildingPositions = JSON.parse(localStorage.getItem(bpKey) || 'null'); } catch {}
      if (!Array.isArray(buildingPositions)) {
        let seed = 0;
        for (let c of currentUser.businessAcc) seed += c.charCodeAt(0);
        const rand = pseudoRandomGenerator(seed);
        buildingPositions = [];
        // interior only
        const interior = intersections.filter(p =>
          p.ix >= 1 && p.ix <= gridCols-2 && p.iy >= 1 && p.iy <= gridRows-2
        );
        const totalInter = interior.length;
        const pickCount = Math.min(5, totalInter);
        const used = new Set();
        const types = ['house','school','hospital','office','shop'];
        for (let i = 0; i < pickCount; i++) {
          let idx;
          do { idx = Math.floor(rand() * totalInter); }
          while (used.has(idx) && used.size < totalInter);
          used.add(idx);
          const p = interior[idx];
          const type = types[Math.floor(rand()*types.length)];
          buildingPositions.push({ ix: p.ix, iy: p.iy, type });
        }
        localStorage.setItem(bpKey, JSON.stringify(buildingPositions));
      }
      return { intersections, horiz, vert, cellW, cellH, buildingPositions };
    }

    // Vehicle persistence
    function loadVehicles() {
      try { const arr = JSON.parse(localStorage.getItem('logisticsVehicles') || '[]'); return Array.isArray(arr)?arr:[]; }
      catch { return []; }
    }
    function saveVehicles(arr) {
      localStorage.setItem('logisticsVehicles', JSON.stringify(arr));
    }
    function initVehicles(count = 10) {
      let vehs = loadVehicles();
      if (vehs.length > 0) return vehs;
      vehs = [];
      for (let i = 1; i <= count; i++) {
        const plate = 'TRK' + String(i).padStart(3,'0');
        vehs.push({
          plate,
          status: 'idle',
          pos: { ix: 0, iy: 0, x: 0, y: 0 },
          path: [], pathIndex: 0,
          orderId: null, itemDesc: null,
          lastUpdate: Date.now(),
          shape: ['car','truck','van'][i % 3],
          color: '#' + Math.floor(Math.random() * 0xFFFFFF).toString(16).padStart(6,'0')
        });
      }
      saveVehicles(vehs);
      return vehs;
    }

    // Address → intersection
    function addressToIntersection(address) {
      if (!address) {
        return { ix: Math.floor(Math.random()*gridCols), iy: Math.floor(Math.random()*gridRows) };
      }
      let sum = 0;
      for (let ch of address) sum += ch.charCodeAt(0);
      const ix = sum % gridCols;
      const iy = Math.floor((sum / gridCols)) % gridRows;
      return { ix, iy };
    }

    // Assign orders to vehicles: now status 'Ordered' → 'delivering'
    function assignOrders() {
      const trades = loadTrades();
      for (let t of trades) {
        if (t.businessAcc === currentUser.businessAcc && t.status === 'Ordered') {
          const veh = vehicles.find(v => v.status === 'idle');
          if (!veh) break;
          const dest = addressToIntersection(t.address || '');
          const destIx = dest.ix, destIy = dest.iy;
          const path = [];
          let cx = veh.pos.ix, cy = veh.pos.iy;
          while (cx !== destIx) {
            cx += (destIx > cx ? 1 : -1);
            path.push({ ix: cx, iy: cy });
          }
          while (cy !== destIy) {
            cy += (destIy > cy ? 1 : -1);
            path.push({ ix: cx, iy: cy });
          }
          if (path.length === 0) {
            // same cell → immediate delivered & return
            t.status = 'Delivered';
            // no marker needed
            continue;
          }
          veh.status = 'delivering';
          veh.path = path;
          veh.pathIndex = 0;
          veh.orderId = t.orderId;
          veh.itemDesc = `${t.quantity} x ${t.productId}`;
          veh.destAddress = t.address || 'Unknown';
          veh.destIx = destIx; veh.destIy = destIy;
          veh.lastUpdate = Date.now();
          // add destination marker
          destinationMarkers.push({
            ix: destIx, iy: destIy,
            address: veh.destAddress, plate: veh.plate
          });
          t.status = 'InTransit';
          saveTrades(trades);
        }
      }
      saveVehicles(vehicles);
    }

    // Update panel counts
    function updatePanel() {
      const total = vehicles.length;
      const available = vehicles.filter(v => v.status === 'idle').length;
      vehicleCountsDiv.innerHTML = `<p>Total vehicles: ${total}</p><p>Available: ${available}</p>`;
    }

    // Traffic & humans (unchanged initialization)
    function initTrafficUnits() {
      trafficUnits = [];
      const count = 10;
      for (let i = 0; i < count; i++) {
        if (Math.random() < 0.5) {
          const row = Math.floor(Math.random() * gridRows);
          const col = Math.floor(Math.random() * (gridCols - 1));
          trafficUnits.push({
            orientation: 'h', row, col, t: Math.random(),
            dir: Math.random()<0.5?1:-1,
            speed: 0.0005 + Math.random()*0.001,
            color: '#ff0'
          });
        } else {
          const col = Math.floor(Math.random() * gridCols);
          const row = Math.floor(Math.random() * (gridRows - 1));
          trafficUnits.push({
            orientation: 'v', row, col, t: Math.random(),
            dir: Math.random()<0.5?1:-1,
            speed: 0.0005 + Math.random()*0.001,
            color: '#0ff'
          });
        }
      }
    }
    function initHumanUnits() {
      humanUnits = [];
      const count = 20;
      for (let i = 0; i < count; i++) {
        if (Math.random() < 0.5) {
          const row = Math.floor(Math.random() * gridRows);
          const colStart = Math.floor(Math.random() * (gridCols - 1));
          const offsetDir = Math.random()<0.5 ? -5 : +5;
          humanUnits.push({
            orientation: 'h', row, colStart, t: Math.random(),
            dir: Math.random()<0.5?1:-1,
            speed: 0.0002 + Math.random()*0.0003,
            offsetY: offsetDir,
            color: '#fff'
          });
        } else {
          const col = Math.floor(Math.random() * gridCols);
          const rowStart = Math.floor(Math.random() * (gridRows - 1));
          const offsetDir = Math.random()<0.5 ? -5 : +5;
          humanUnits.push({
            orientation: 'v', rowStart, col, t: Math.random(),
            dir: Math.random()<0.5?1:-1,
            speed: 0.0002 + Math.random()*0.0003,
            offsetX: offsetDir,
            color: '#ccc'
          });
        }
      }
    }

    // Traffic lights
    const trafficLights = [];
    function initTrafficLights() {
      trafficLights.length = 0;
      grid.intersections.forEach(p => {
        trafficLights.push({
          ix: p.ix, iy: p.iy,
          state: Math.random()<0.5?'green':'red',
          timer: Date.now() + 2000 + Math.random()*3000
        });
      });
    }
    function updateTrafficLights() {
      const now = Date.now();
      trafficLights.forEach(tl => {
        if (now >= tl.timer) {
          tl.state = (tl.state==='green'?'red':'green');
          tl.timer = now + 2000 + Math.random()*3000;
        }
      });
    }

    // Draw map: grass, roads, buildings, traffic lights, trafficUnits, humans, vehicles, destination X markers
    function drawMap() {
      updateTrafficLights();
      ctx.save();
      ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
      ctx.clearRect(0,0,canvas.width/scale,canvas.height/scale);

      // Grass fields
      ctx.fillStyle = '#0a0';
      for (let iy=0; iy<gridRows-1; iy++){
        for (let ix=0; ix<gridCols-1; ix++){
          const pTL = grid.intersections.find(p=>p.ix===ix&&p.iy===iy);
          if (!pTL) continue;
          ctx.fillRect(pTL.x+2, pTL.y+2, grid.cellW-4, grid.cellH-4);
        }
      }

      // Roads
      ctx.lineCap='round';
      // Horizontal
      for (let iy=0; iy<gridRows; iy++){
        for (let ix=0; ix<gridCols-1; ix++){
          const p1 = grid.intersections.find(p=>p.ix===ix&&p.iy===iy);
          const p2 = grid.intersections.find(p=>p.ix===ix+1&&p.iy===iy);
          if (!p1||!p2) continue;
          const col = grid.horiz[iy][ix]==='blue'? '#1E90FF':'#FFA500';
          ctx.strokeStyle = col; ctx.lineWidth=8;
          ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
          ctx.save();
          ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.setLineDash([10,10]);
          ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
          ctx.restore();
        }
      }
      // Vertical
      for (let iy=0; iy<gridRows-1; iy++){
        for (let ix=0; ix<gridCols; ix++){
          const p1 = grid.intersections.find(p=>p.ix===ix&&p.iy===iy);
          const p2 = grid.intersections.find(p=>p.ix===ix&&p.iy===iy+1);
          if (!p1||!p2) continue;
          const col = grid.vert[iy][ix]==='blue'? '#1E90FF':'#FFA500';
          ctx.strokeStyle=col; ctx.lineWidth=8;
          ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
          ctx.save();
          ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.setLineDash([10,10]);
          ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
          ctx.restore();
        }
      }

      // Traffic lights
      trafficLights.forEach(tl=>{
        const p = grid.intersections.find(p=>p.ix===tl.ix&&p.iy===tl.iy);
        if (!p) return;
        const size = 8;
        ctx.fillStyle = (tl.state==='green'? '#0f0':'#f00');
        ctx.beginPath();
        ctx.arc(p.x + size, p.y - size, size/2, 0, 2*Math.PI);
        ctx.fill();
      });

      // Buildings
      if (grid.buildingPositions){
        grid.buildingPositions.forEach(bp=>{
          const pt = grid.intersections.find(p=>p.ix===bp.ix&&p.iy===bp.iy);
          if (!pt) return;
          const size = Math.min(grid.cellW,grid.cellH)*0.6;
          const half=size/2;
          const x0=pt.x-half, y0=pt.y-half;
          ctx.save();
          switch(bp.type){
            case 'house':
              ctx.fillStyle='#a52';
              ctx.shadowColor='#000'; ctx.shadowBlur=5;
              ctx.fillRect(x0, y0+half*0.4, size, half*0.6);
              ctx.restore();
              ctx.fillStyle='#800';
              ctx.beginPath();
              ctx.moveTo(x0, y0+half*0.4);
              ctx.lineTo(x0+half, y0);
              ctx.lineTo(x0+size, y0+half*0.4);
              ctx.closePath(); ctx.fill();
              break;
            case 'school':
              ctx.fillStyle='#448'; ctx.shadowColor='#000'; ctx.shadowBlur=5;
              ctx.fillRect(x0, y0+half*0.3, size, half*0.7);
              ctx.restore();
              ctx.fillStyle='#66a';
              ctx.beginPath();
              ctx.moveTo(x0, y0+half*0.3);
              ctx.lineTo(x0+half, y0);
              ctx.lineTo(x0+size, y0+half*0.3);
              ctx.closePath(); ctx.fill();
              ctx.fillStyle='#fff';
              ctx.font=`${Math.floor(size/3)}px monospace`;
              ctx.textAlign='center';
              ctx.fillText('S', pt.x, pt.y+half*0.2);
              break;
            case 'hospital':
              ctx.fillStyle='#800'; ctx.shadowColor='#000'; ctx.shadowBlur=5;
              ctx.fillRect(x0, y0+half*0.3, size, half*0.7);
              ctx.restore();
              ctx.fillStyle='#a00';
              ctx.beginPath();
              ctx.moveTo(x0, y0+half*0.3);
              ctx.lineTo(x0+half, y0);
              ctx.lineTo(x0+size, y0+half*0.3);
              ctx.closePath(); ctx.fill();
              ctx.fillStyle='#fff';
              const crossSize=size*0.4;
              ctx.fillRect(pt.x-crossSize/2, pt.y-crossSize/10, crossSize, crossSize/5);
              ctx.fillRect(pt.x-crossSize/10, pt.y-crossSize/2, crossSize/5, crossSize);
              break;
            case 'office':
              ctx.fillStyle='#555'; ctx.shadowColor='#000'; ctx.shadowBlur=5;
              ctx.fillRect(x0, y0+half*0.3, size, half*0.7);
              ctx.restore();
              ctx.fillStyle='#eef';
              const winW=size/5, winH=half*0.2;
              for (let r=0;r<2;r++){
                for (let c=0;c<3;c++){
                  ctx.fillRect(x0+5+c*(winW+5), y0+half*0.35+r*(winH+5), winW, winH);
                }
              }
              break;
            case 'shop':
              ctx.fillStyle='#884'; ctx.shadowColor='#000'; ctx.shadowBlur=5;
              ctx.fillRect(x0, y0+half*0.3, size, half*0.7);
              ctx.restore();
              ctx.fillStyle='#fff';
              ctx.font=`${Math.floor(size/4)}px monospace`;
              ctx.textAlign='center';
              ctx.fillText('Shop', pt.x, y0+half*0.5);
              break;
            default:
              ctx.fillStyle='#666';
              ctx.fillRect(x0, y0+half*0.3, size, half*0.7);
              ctx.restore();
          }
        });
      }

      // Draw destination markers (X)
      destinationMarkers.forEach(dm=>{
        const p = grid.intersections.find(p=>p.ix===dm.ix&&p.iy===dm.iy);
        if (!p) return;
        ctx.save();
        ctx.strokeStyle='#f0f'; ctx.lineWidth=3;
        const s = 10;
        ctx.beginPath();
        ctx.moveTo(p.x - s, p.y - s);
        ctx.lineTo(p.x + s, p.y + s);
        ctx.moveTo(p.x + s, p.y - s);
        ctx.lineTo(p.x - s, p.y + s);
        ctx.stroke();
        ctx.restore();
      });

      // Draw trafficUnits
      trafficUnits.forEach(tu=>{
        tu.t += tu.speed;
        if (tu.t>1) tu.t=0;
        if (tu.orientation==='h') {
          const p1=grid.intersections.find(p=>p.ix===tu.col&&p.iy===tu.row);
          const p2=grid.intersections.find(p=>p.ix===tu.col+1&&p.iy===tu.row);
          if (p1&&p2){
            let x = p1.x + (p2.x-p1.x)*(tu.t*tu.dir);
            let y = p1.y;
            if (x<Math.min(p1.x,p2.x)) x=Math.max(p1.x,p2.x);
            if (x>Math.max(p1.x,p2.x)) x=Math.min(p1.x,p2.x);
            ctx.save();
            ctx.translate(x,y);
            ctx.fillStyle=tu.color;
            ctx.fillRect(-5,-3,10,6);
            ctx.restore();
          }
        } else {
          const p1=grid.intersections.find(p=>p.ix===tu.col&&p.iy===tu.row);
          const p2=grid.intersections.find(p=>p.ix===tu.col&&p.iy===tu.row+1);
          if (p1&&p2){
            let y = p1.y + (p2.y-p1.y)*(tu.t*tu.dir);
            let x = p1.x;
            if (y<Math.min(p1.y,p2.y)) y=Math.max(p1.y,p2.y);
            if (y>Math.max(p1.y,p2.y)) y=Math.min(p1.y,p2.y);
            ctx.save();
            ctx.translate(x,y);
            ctx.fillStyle=tu.color;
            ctx.fillRect(-3,-5,6,10);
            ctx.restore();
          }
        }
      });

      // Draw humans
      humanUnits.forEach(hu=>{
        hu.t += hu.speed;
        if (hu.t>1) hu.t=0;
        if (hu.orientation==='h'){
          const p1=grid.intersections.find(p=>p.ix===hu.colStart&&p.iy===hu.row);
          const p2=grid.intersections.find(p=>p.ix===hu.colStart+1&&p.iy===hu.row);
          if (p1&&p2){
            let x = p1.x + (p2.x-p1.x)*(hu.t*hu.dir);
            let y = p1.y + hu.offsetY;
            if (x<Math.min(p1.x,p2.x)) x=Math.max(p1.x,p2.x);
            if (x>Math.max(p1.x,p2.x)) x=Math.min(p1.x,p2.x);
            ctx.save();
            ctx.fillStyle=hu.color;
            ctx.beginPath(); ctx.arc(x,y,3,0,2*Math.PI); ctx.fill();
            ctx.restore();
          }
        } else {
          const p1=grid.intersections.find(p=>p.ix===hu.col&&p.iy===hu.rowStart);
          const p2=grid.intersections.find(p=>p.ix===hu.col&&p.iy===hu.rowStart+1);
          if (p1&&p2){
            let y = p1.y + (p2.y-p1.y)*(hu.t*hu.dir);
            let x = p1.x + hu.offsetX;
            if (y<Math.min(p1.y,p2.y)) y=Math.max(p1.y,p2.y);
            if (y>Math.max(p1.y,p2.y)) y=Math.min(p1.y,p2.y);
            ctx.save();
            ctx.fillStyle=hu.color;
            ctx.beginPath(); ctx.arc(x,y,3,0,2*Math.PI); ctx.fill();
            ctx.restore();
          }
        }
      });

      // Draw vehicles
      vehicles.forEach(v=>{
        const vx=v.pos.x, vy=v.pos.y;
        ctx.save();
        ctx.translate(vx,vy);
        ctx.fillStyle=v.color;
        switch(v.shape){
          case 'car':
            ctx.fillRect(-10,-5,20,10); break;
          case 'truck':
            ctx.fillRect(-12,-6,24,12); break;
          case 'van':
            ctx.beginPath();
            ctx.moveTo(-10,5);
            ctx.lineTo(-10,-5);
            ctx.lineTo(10,-5);
            ctx.lineTo(12,0);
            ctx.lineTo(10,5);
            ctx.closePath(); ctx.fill();
            break;
          default:
            ctx.fillRect(-8,-4,16,8);
        }
        // wheels
        ctx.fillStyle='#333';
        ctx.beginPath(); ctx.arc(-6,6,3,0,2*Math.PI); ctx.fill();
        ctx.beginPath(); ctx.arc(6,6,3,0,2*Math.PI); ctx.fill();
        // plate
        ctx.fillStyle='#fff';
        ctx.font='10px monospace';
        ctx.textAlign='center';
        ctx.fillText(v.plate,0,-8);
        ctx.restore();

        // Log movement
        movementLog.push({
          timestamp: Date.now(),
          plate: v.plate,
          x: vx, y: vy
        });
      });

      ctx.restore();

      updatePanel();
      drawMiniMap();
    }

    // Minimap
    function drawMiniMap() {
      const mw = miniMapCanvas.width, mh = miniMapCanvas.height;
      miniCtx.clearRect(0,0,mw,mh);
      // background
      miniCtx.fillStyle='#111';
      miniCtx.fillRect(0,0,mw,mh);
      // simple grid
      miniCtx.strokeStyle='#555'; miniCtx.lineWidth=2;
      for (let iy=0;iy<gridRows;iy++){
        const y = iy*(mh/(gridRows-1));
        miniCtx.beginPath(); miniCtx.moveTo(0,y); miniCtx.lineTo(mw,y); miniCtx.stroke();
      }
      for (let ix=0;ix<gridCols;ix++){
        const x = ix*(mw/(gridCols-1));
        miniCtx.beginPath(); miniCtx.moveTo(x,0); miniCtx.lineTo(x,mh); miniCtx.stroke();
      }
      // vehicles
      vehicles.forEach(v=>{
        const mx = v.pos.x/(canvas.width/scale)*mw;
        const my = v.pos.y/(canvas.height/scale)*mh;
        miniCtx.fillStyle=v.color;
        miniCtx.beginPath(); miniCtx.arc(mx,my,3,0,2*Math.PI); miniCtx.fill();
      });
    }

    // Animation loop
    let mapInterval = null;
    function startMapLoop() {
      if (mapInterval) return;
      mapInterval = setInterval(() => {
        const now = Date.now();
        let changed=false;
        vehicles.forEach(v=>{
          if (v.status==='delivering' && v.path && v.pathIndex < v.path.length) {
            const next=v.path[v.pathIndex];
            const currPt=grid.intersections.find(p=>p.ix===v.pos.ix&&p.iy===v.pos.iy);
            const nextPt=grid.intersections.find(p=>p.ix===next.ix&&p.iy===next.iy);
            if (!currPt||!nextPt){
              v.status='idle'; v.path=[]; v.pathIndex=0;
              changed=true;
            } else {
              let roadColor='blue', speed=0.05;
              if (currPt.iy===nextPt.iy) {
                const row=currPt.iy, col=Math.min(currPt.ix,nextPt.ix);
                roadColor=grid.horiz[row][col];
              } else {
                const col=currPt.ix, row=Math.min(currPt.iy,nextPt.iy);
                roadColor=grid.vert[row][col];
              }
              speed=(roadColor==='blue'?0.05:0.02);
              const dx=nextPt.x - v.pos.x, dy=nextPt.y - v.pos.y;
              const dist=Math.hypot(dx,dy);
              const dt=now - v.lastUpdate;
              const moveDist = speed * dt;
              if (dist <= moveDist) {
                v.pos.ix=next.ix; v.pos.iy=next.iy; v.pos.x=nextPt.x; v.pos.y=nextPt.y;
                v.pathIndex++;
                if (v.pathIndex >= v.path.length) {
                  // reached destination
                  alert(`Vehicle with plate ${v.plate} reached ${v.destAddress} and completed delivery.`);
                  // remove destination marker
                  for (let i=destinationMarkers.length-1;i>=0;i--){
                    const dm=destinationMarkers[i];
                    if (dm.plate===v.plate) {
                      destinationMarkers.splice(i,1);
                    }
                  }
                  // Now route back to depot [0,0]
                  const depotIx=0, depotIy=0;
                  const returnPath=[];
                  let cx=v.pos.ix, cy=v.pos.iy;
                  while (cx!==depotIx){
                    cx += (depotIx>cx?1:-1);
                    returnPath.push({ ix:cx, iy:cy });
                  }
                  while (cy!==depotIy){
                    cy += (depotIy>cy?1:-1);
                    returnPath.push({ ix:cx, iy:cy });
                  }
                  if (returnPath.length>0) {
                    v.status='returning';
                    v.path=returnPath;
                    v.pathIndex=0;
                  } else {
                    v.status='idle';
                    v.path=[]; v.pathIndex=0;
                  }
                  v.destAddress=null; v.destIx=null; v.destIy=null;
                  updatePanel();
                }
              } else {
                v.pos.x += (dx/dist)*moveDist;
                v.pos.y += (dy/dist)*moveDist;
              }
              v.lastUpdate=now;
              changed=true;
            }
          } else if (v.status==='returning' && v.path && v.pathIndex < v.path.length) {
            const next=v.path[v.pathIndex];
            const currPt=grid.intersections.find(p=>p.ix===v.pos.ix&&p.iy===v.pos.iy);
            const nextPt=grid.intersections.find(p=>p.ix===next.ix&&p.iy===next.iy);
            if (!currPt||!nextPt) {
              v.status='idle'; v.path=[]; v.pathIndex=0; changed=true;
            } else {
              let roadColor='blue', speed=0.05;
              if (currPt.iy===nextPt.iy) {
                const row=currPt.iy, col=Math.min(currPt.ix,nextPt.ix);
                roadColor=grid.horiz[row][col];
              } else {
                const col=currPt.ix, row=Math.min(currPt.iy,nextPt.iy);
                roadColor=grid.vert[row][col];
              }
              speed=(roadColor==='blue'?0.05:0.02);
              const dx=nextPt.x - v.pos.x, dy=nextPt.y - v.pos.y;
              const dist=Math.hypot(dx,dy);
              const dt=now - v.lastUpdate;
              const moveDist = speed * dt;
              if (dist <= moveDist) {
                v.pos.ix=next.ix; v.pos.iy=next.iy; v.pos.x=nextPt.x; v.pos.y=nextPt.y;
                v.pathIndex++;
                if (v.pathIndex >= v.path.length) {
                  v.status='idle'; v.path=[]; v.pathIndex=0;
                  updatePanel();
                }
              } else {
                v.pos.x += (dx/dist)*moveDist;
                v.pos.y += (dy/dist)*moveDist;
              }
              v.lastUpdate=now;
              changed=true;
            }
          }
        });
        if (changed) saveVehicles(vehicles);
        drawMap();
      }, 50);
    }
    function stopMapLoop() {
      if (mapInterval) {
        clearInterval(mapInterval);
        mapInterval=null;
      }
    }

    // Resize & compute grid
    function resizeCanvas() {
      const container = document.getElementById('mapContainer');
      canvas.width = container.clientWidth - panel.offsetWidth;
      canvas.height = container.clientHeight;
      grid = computeGrid();
      vehicles.forEach(v=>{
        const pt=grid.intersections.find(p=>p.ix===v.pos.ix&&p.iy===v.pos.iy);
        if (pt) { v.pos.x=pt.x; v.pos.y=pt.y; }
        else {
          const margin=20;
          v.pos.x=margin+Math.random()*(canvas.width/scale-2*margin);
          v.pos.y=margin+Math.random()*(canvas.height/scale-2*margin);
        }
      });
      drawMap();
    }
    window.addEventListener('resize', resizeCanvas);

    // Zoom/pan handlers
    canvas.addEventListener('wheel', e=>{
      e.preventDefault();
      const rect=canvas.getBoundingClientRect();
      const mx=e.clientX-rect.left, my=e.clientY-rect.top;
      const x0=(mx-offsetX)/scale, y0=(my-offsetY)/scale;
      const delta=-e.deltaY*0.001;
      const newScale=Math.min(Math.max(0.5, scale*(1+delta)), 3);
      scale=newScale;
      offsetX=mx - x0*scale;
      offsetY=my - y0*scale;
      drawMap();
    });
    canvas.addEventListener('mousedown', e=>{
      isDragging=true;
      dragStartX=e.clientX-offsetX;
      dragStartY=e.clientY-offsetY;
      canvas.style.cursor='grabbing';
    });
    window.addEventListener('mousemove', e=>{
      if (!isDragging) return;
      offsetX=e.clientX-dragStartX;
      offsetY=e.clientY-dragStartY;
      drawMap();
    });
    window.addEventListener('mouseup', e=>{
      if (isDragging) {
        isDragging=false;
        canvas.style.cursor='grab';
      }
    });

    // Canvas click for vehicle info
    canvas.addEventListener('click', e=>{
      const rect=canvas.getBoundingClientRect();
      const mx=e.clientX-rect.left, my=e.clientY-rect.top;
      const x=(mx-offsetX)/scale, y=(my-offsetY)/scale;
      const radius=10;
      const found=vehicles.find(v=>{
        const dx=v.pos.x-x, dy=v.pos.y-y;
        return Math.hypot(dx,dy)<=radius;
      });
      if (found) {
        infoBox.style.display='block';
        infoBox.innerHTML=`
          <p>Plate: ${found.plate}</p>
          <p>Status: ${found.status}</p>
          ${found.status==='delivering'? `<p>Delivering to: ${found.destAddress}</p>`:''}
        `;
        let left=e.clientX+10, top=e.clientY+10;
        infoBox.style.left=left+'px';
        infoBox.style.top=top+'px';
        setTimeout(()=>{ infoBox.style.display='none'; },3000);
      }
    });

    // Panel buttons
    btnAdd.onclick = ()=>{
      const margin=20;
      const x=margin + Math.random()*(canvas.width/scale - 2*margin);
      const y=margin + Math.random()*(canvas.height/scale -2*margin);
      const plate='TRK'+String(vehicles.length+1).padStart(3,'0');
      const veh={
        plate,
        status:'idle',
        pos:{ ix:0, iy:0, x, y },
        path:[], pathIndex:0, orderId:null, itemDesc:null,
        lastUpdate:Date.now(),
        shape:['car','truck','van'][vehicles.length%3],
        color:'#'+Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0')
      };
      vehicles.push(veh);
      saveVehicles(vehicles);
      drawMap();
    };
    btnExport.onclick = ()=>{
      if (movementLog.length===0) return alert("No movement data yet.");
      let csv='timestamp,plate,x,y\n';
      movementLog.forEach(entry=>{
        csv+=`${entry.timestamp},${entry.plate},${entry.x.toFixed(2)},${entry.y.toFixed(2)}\n`;
      });
      const blob=new Blob([csv],{type:'text/csv'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=`vehicle_log_${currentUser.businessAcc}_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    };
    btnClose.onclick = ()=>{
      console.log("Quit Map clicked");
      stopMapLoop();
      window.removeEventListener('resize', resizeCanvas);
      renderMenu("<h3 style='padding:20px;'>Map closed.</h3>");
    };

    // Initialize everything
    resizeCanvas();
    grid = computeGrid();
    initTrafficUnits();
    initHumanUnits();
    trafficLights.length=0; initTrafficLights();

    // Prompt fleet size on each map open
    let fleetSize = parseInt(prompt("Enter fleet size (number of vehicles):", "10"), 10);
    if (isNaN(fleetSize) || fleetSize <= 0) fleetSize = 10;
    vehicles = initVehicles(fleetSize);
    vehicles.forEach(v=>{
      const pt=grid.intersections.find(p=>p.ix===v.pos.ix&&p.iy===v.pos.iy);
      if (pt) { v.pos.x=pt.x; v.pos.y=pt.y; }
      else {
        const margin=20;
        v.pos.x=margin+Math.random()*(canvas.width/scale -2*margin);
        v.pos.y=margin+Math.random()*(canvas.height/scale -2*margin);
      }
      v.lastUpdate=Date.now();
    });
    saveVehicles(vehicles);
    assignOrders();
    updatePanel();

    startMapLoop();
    drawMap();
  }, 100);
}

    loadUsers();
    const logged = loadCurrentUser();
    if(!logged) renderInitial("Please choose: Register new user, Login, Forgot Password, or Exit.\nExisting sample user: username: ali, password: 1234");

    function updateClock() {
      const now = new Date();
      const dateStr = now.toLocaleDateString('tr-TR', { year: 'numeric', month: 'numeric', day: 'numeric' });
      const timeStr = now.toLocaleTimeString('tr-TR');
      document.getElementById('liveClock').innerText = `${dateStr} ${timeStr}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

  </script>
</body>
